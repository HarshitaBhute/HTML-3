<!DOCTYPE html>
<html>
<head>
    <title>Pseudo-Class Example</title>

    <style>
        input {
            padding: 10px;
            border: 2px solid gray;
        }

        input:focus {
            border-color: blue;
            background-color: #f0f8ff;
        }
    </style>

</head>

<body>

    <h2>Click inside the input field:</h2>
    <input type="text" placeholder="Type something...">

</body>
</html>
