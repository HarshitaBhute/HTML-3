<!DOCTYPE html>
<html>
<head>
<style>

/* unvisited link */
a:link {
    color: black;
}

/* visited link */
a:visited {
    color: blue;
}

/* mouse over link */
a:hover {
    color: red;
}

/* selected link */
a:active {   
    color: green;
}

</style>
</head>

<body>

<h2>Styling a link depending on state</h2>

<p>
    <b>
        <a href="https://www.google.com" target="_blank">
            Click here
        </a>
    </b>
</p>

</body>
</html>
