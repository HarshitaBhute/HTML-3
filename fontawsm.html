<!DOCTYPE html>
<html>
<head>
    <title>Font Awesome Social Icons</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .fa-facebook {
            color: DodgerBlue;
        }

        .fa-twitter {
            color: DeepSkyBlue;
        }

        .fa-instagram {
            color: Crimson;
        }
    </style>
</head>

<body>

    <h2>Follow Us on Social Media:</h2>

    <a href="#">
        <i class="fab fa-facebook"></i> Facebook
    </a>
    <br>

    <a href="#">
        <i class="fab fa-twitter"></i> Twitter
    </a>
    <br>

    <a href="#">
        <i class="fab fa-instagram"></i> Instagram
    </a>

</body>
</html>
