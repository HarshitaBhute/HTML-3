<!DOCTYPE html>
<html>
<head>
    <title>Employee Table Example</title>
</head>
<body>

<table border="1" cellpadding="10" align="center">
    <caption><h2>Employee Table</h2></caption>

    <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Position</th>
            <th>Department</th>
            <th>Salary</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>John</td>
            <td>Manager</td>
            <td>Sales</td>
            <td>75,000</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Smith</td>
            <td rowspan="2">Developer</td>
            <td>IT</td>
            <td>70,000</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Johnson</td>
            <td>IT</td>
            <td>65,000</td>
        </tr>

        <tr>
            <td>4</td>
            <td>Rose</td>
            <td>Executive</td>
            <td>HR</td>
            <td>40,000</td>
        </tr>

    </tbody>

</table>

</body>
</html>
