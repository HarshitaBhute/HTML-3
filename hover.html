<!DOCTYPE html>
<html>
<head>
    <title>Pseudo-Class Example</title>

    <style>
        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
    </style>

</head>

<body>

    <h2>Hover over the button:</h2>
    <button>Click Me</button>

</body>
</html>
